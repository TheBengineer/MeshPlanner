name: Cross-Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: crossval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-crossval:
    name: Python cross-validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Run Python cross-validation tests
        run: pytest tests/cross_validation/ -v

  js-crossval:
    name: JS cross-validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: meshplanner-app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: meshplanner-app/package-lock.json

      - name: Install JS dependencies
        run: npm ci

      - name: Run JS cross-validation tests
        run: npx vitest run src/tests/cross_validation/
